name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build x86_64 and create the GitHub Release
  build-x86:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/port dist/port-x86_64
          tar -czf dist/port-x86_64-unknown-linux-gnu.tar.gz -C dist port-x86_64
          # Create install script
          cat > dist/port-install.sh << 'INSTALLER'
          #!/usr/bin/env sh
          set -e
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) ASSET="port-x86_64-unknown-linux-gnu.tar.gz" ;;
            aarch64|arm64) ASSET="port-aarch64-unknown-linux-gnu.tar.gz" ;;
            *) echo "Unsupported architecture: $ARCH" && exit 1 ;;
          esac
          TMPDIR=$(mktemp -d)
          curl -sL "https://github.com/enrell/port/releases/latest/download/$ASSET" -o "$TMPDIR/port.tar.gz"
          tar -xzf "$TMPDIR/port.tar.gz" -C "$TMPDIR"
          # The tarball extracts to a single file (port-x86_64)
          install -Dm755 "$TMPDIR/port-x86_64" "$HOME/.local/bin/port"
          rm -rf "$TMPDIR"
          echo "Installed port to ~/.local/bin/port"
          INSTALLER
          chmod +x dist/port-install.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: |
            dist/port-x86_64-unknown-linux-gnu.tar.gz
            dist/port-install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build aarch64 via cross-compilation on x86_64 runner
  build-arm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Configure cross-compilation
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/port dist/port-aarch64
          tar -czf port-aarch64-unknown-linux-gnu.tar.gz -C dist port-aarch64

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: port-aarch64-unknown-linux-gnu.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
