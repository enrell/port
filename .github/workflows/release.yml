name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # On push to main: build and test
  ci:
    runs-on: ubuntu-latest
    if: github.event_name != 'tag'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Generate version tag
        id: version
        run: |
          # Count commits since last tag to create auto-incrementing version
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          COMMIT_COUNT=$(git rev-list --count HEAD ^$(git rev-parse $LAST_TAG) 2>/dev/null || echo "1")

          # Parse last tag and increment
          LAST_VER=$(echo $LAST_TAG | sed 's/^v//')
          MAJOR=$(echo $LAST_VER | cut -d. -f1)
          MINOR=$(echo $LAST_VER | cut -d. -f2)
          PATCH=$(echo $LAST_VER | cut -d. -f3)

          # Increment patch or start at v0.1.0
          if [ "$COMMIT_COUNT" -gt 0 ]; then
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "count=$COMMIT_COUNT" >> $GITHUB_OUTPUT

      - name: Create tag
        if: steps.version.outputs.count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.version.outputs.tag }} -m "Release ${{ steps.version.outputs.tag }}"
          git push origin ${{ steps.version.outputs.tag }}

  # Release job - triggered when a tag exists (pushed by CI)
  release:
    runs-on: ubuntu-latest
    needs: ci
    if: ${{ always() && needs.ci.result == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust (x86_64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Rust (aarch64 toolchain)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
        shell: bash

      - name: Configure cross-compilation
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build x86_64
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/port dist/port-x86_64
          tar -czf dist/port-x86_64-unknown-linux-gnu.tar.gz -C dist port-x86_64

      - name: Build aarch64
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu
          cp target/aarch64-unknown-linux-gnu/release/port dist/port-aarch64
          tar -czf dist/port-aarch64-unknown-linux-gnu.tar.gz -C dist port-aarch64

      - name: Include install script in dist
        run: |
          cp scripts/install.sh dist/
          chmod +x dist/install.sh

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/port-x86_64-unknown-linux-gnu.tar.gz
            dist/port-aarch64-unknown-linux-gnu.tar.gz
            dist/install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}